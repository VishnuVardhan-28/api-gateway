spring:
  application:
    name: api-gateway
  reactor:
    context-propagation: auto
eureka:
  instance:
    hostname: localhost
  client:
    register-with-eureka: true
    fetch-registry: true
    serviceUrl:
      defaultZone: http://localhost:8761/eureka

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway.route.RouteDefinitionLocator: INFO
    org.springframework.cloud.gateway: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}] %m%n"

management:
  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: "w3c,b3"
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans